version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: isi_chatbot_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: isi_knowledge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: