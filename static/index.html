<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT - ISI Assistant</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1e1e1e;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #f7f7f8;
            border-right: 1px solid #e5e5e5;
            padding: 12px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        /* Logo ChatGPT */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 4px;
            margin-bottom: 16px;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo span {
            font-size: 18px;
            font-weight: 600;
            color: #1e1e1e;
        }

        /* Bouton Nouvelle Conversation */
        .new-chat-btn {
            background: #ffffff;
            border: 1px solid #d9d9d9;
            color: #1e1e1e;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .new-chat-btn:hover {
            background: #f0f0f0;
        }

        .new-chat-btn .icon {
            font-size: 18px;
        }

        /* Section Recents */
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8e8ea0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 4px;
            margin-bottom: 4px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 4px;
        }

        .history-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1e1e1e;
            transition: background 0.2s;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: #f0f0f0;
        }

        .history-item .history-icon {
            font-size: 14px;
            color: #8e8ea0;
        }

        /* Footer Sidebar */
        .sidebar-footer {
            border-top: 1px solid #e5e5e5;
            padding-top: 12px;
            margin-top: 8px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-info:hover {
            background: #f0f0f0;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #10a37f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            color: white;
        }

        .user-name {
            font-size: 14px;
            color: #1e1e1e;
            flex: 1;
        }

        .user-badge {
            font-size: 11px;
            color: #8e8ea0;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f7f7f8;
        }

        /* ===== CENTER CONTENT ===== */
        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Logo principal */
        .main-logo {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-logo svg {
            width: 48px;
            height: 48px;
        }

        .main-logo h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1e1e1e;
        }

        .main-logo h1 span {
            color: #10a37f;
        }

        /* Sous-titre */
        .subtitle {
            font-size: 16px;
            color: #8e8ea0;
            margin-bottom: 32px;
            text-align: center;
        }

        /* ===== SUGGESTIONS (cartes) ===== */
        .suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .suggestion-card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggestion-card:hover {
            background: #f0f0f0;
            border-color: #d0d0d0;
        }

        .suggestion-card .s-icon {
            font-size: 18px;
            color: #10a37f;
        }

        .suggestion-card .s-text {
            font-size: 14px;
            color: #1e1e1e;
        }

        /* ===== CHAT MESSAGES ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .message-wrapper {
            padding: 16px 20px;
            animation: fadeIn 0.3s ease-in;
        }

        .message-wrapper.user {
            background: transparent;
        }

        .message-wrapper.bot {
            background: #f7f7f8;
        }

        .message-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message-wrapper.user .message-avatar {
            background: #10a37f;
            color: white;
        }

        .message-wrapper.bot .message-avatar {
            background: #19c37d;
            color: white;
        }

        .message-text {
            flex: 1;
            line-height: 1.6;
            color: #1e1e1e;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message-text p {
            margin-bottom: 8px;
        }

        .message-text .sources {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e5e5e5;
            font-size: 13px;
        }

        .message-text .sources summary {
            color: #10a37f;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .message-text .sources summary:hover {
            color: #0d8a6a;
        }

        .source-item {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #4a4a4a;
            border-left: 3px solid #10a37f;
        }

        .source-item strong {
            color: #1e1e1e;
        }

        /* ===== TYPING ===== */
        .typing-indicator {
            padding: 16px 20px;
            display: none;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator .message-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8e8ea0;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            padding: 16px 20px 24px 20px;
            background: #f7f7f8;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper textarea {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 12px;
            border: 1px solid #d9d9d9;
            background: #ffffff;
            color: #1e1e1e;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            min-height: 52px;
            max-height: 200px;
            line-height: 1.5;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .input-wrapper textarea:focus {
            border-color: #10a37f;
            box-shadow: 0 2px 6px rgba(16, 163, 127, 0.1);
        }

        .input-wrapper textarea::placeholder {
            color: #8e8ea0;
        }

        .input-wrapper .send-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            background: #10a37f;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            min-height: 34px;
        }

        .input-wrapper .send-btn:hover:not(:disabled) {
            background: #0d8a6a;
        }

        .input-wrapper .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
                background: #f7f7f8;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }

            .menu-toggle {
                display: block !important;
                background: none;
                border: none;
                font-size: 24px;
                cursor: pointer;
                color: #1e1e1e;
                padding: 4px 8px;
            }

            .top-header {
                display: flex !important;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                border-bottom: 1px solid #e5e5e5;
                background: #f7f7f8;
            }

            .top-header .header-title {
                font-size: 18px;
                font-weight: 600;
            }

            .top-header .header-title span {
                color: #10a37f;
            }

            .center-content {
                padding: 12px;
            }

            .main-logo h1 {
                font-size: 24px;
            }

            .input-area {
                padding: 12px 12px 20px 12px;
            }

            .message-wrapper {
                padding: 12px 12px;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none !important;
            }
            .top-header {
                display: none !important;
            }
        }

        /* Overlay mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- ===== OVERLAY MOBILE ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar" id="sidebar">
        <!-- Logo -->
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="6" fill="#10a37f"/>
                <path d="M16 6L22 14L20 18L16 22L12 18L10 14L16 6Z" fill="white" stroke="white" stroke-width="1.5"/>
                <path d="M16 22L22 14L24 18L16 26L8 18L10 14L16 22Z" fill="white" stroke="white" stroke-width="1.5"/>
            </svg>
            <span>ChatGPT</span>
        </div>

        <!-- Nouvelle conversation -->
        <button class="new-chat-btn" onclick="resetChat()">
            <span class="icon">✏️</span>
            Nouvelle conversation
        </button>

        <!-- Recents -->
        <div class="section-title">Recents</div>
        <div class="history-list" id="historyList">
            <div class="history-item" onclick="askSuggestion('Charte graphique de ChatGPT')">
                <span class="history-icon">💬</span> Charte graphique de ChatGPT
            </div>
            <div class="history-item" onclick="askSuggestion('Création fichier PDF ISI')">
                <span class="history-icon">💬</span> Création fichier PDF ISI
            </div>
        </div>

        <!-- Footer Sidebar -->
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">U</div>
                <span class="user-name">User</span>
                <span class="user-badge">Free</span>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">

        <!-- Top Header (mobile) -->
        <div class="top-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="header-title">🤖 <span>ISI</span> Assistant</div>
        </div>

        <!-- Center Content -->
        <div class="center-content" id="centerContent">
            <!-- Logo principal -->
            <div class="main-logo">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px;">
                    <rect width="32" height="32" rx="6" fill="#10a37f"/>
                    <path d="M16 6L22 14L20 18L16 22L12 18L10 14L16 6Z" fill="white" stroke="white" stroke-width="1.5"/>
                    <path d="M16 22L22 14L24 18L16 26L8 18L10 14L16 22Z" fill="white" stroke="white" stroke-width="1.5"/>
                </svg>
                <h1>Par quoi commençons-nous ?</h1>
            </div>

            <!-- Sous-titre -->
            <div class="subtitle">Posez votre question sur l'ISI</div>

            <!-- Suggestions -->
            <div class="suggestions" id="suggestions">
                <div class="suggestion-card" onclick="askSuggestion('Quelles formations propose l\'ISI ?')">
                    <span class="s-icon">🎓</span>
                    <span class="s-text">Quelles formations propose l'ISI ?</span>
                </div>
                <div class="suggestion-card" onclick="askSuggestion('Quels sont les campus de l\'ISI ?')">
                    <span class="s-icon">🏛️</span>
                    <span class="s-text">Quels sont les campus de l'ISI ?</span>
                </div>
                <div class="suggestion-card" onclick="askSuggestion('Quels sont les prix de l\'ISI ?')">
                    <span class="s-icon">🏆</span>
                    <span class="s-text">Quels sont les prix de l'ISI ?</span>
                </div>
                <div class="suggestion-card" onclick="askSuggestion('Comment contacter l\'ISI ?')">
                    <span class="s-icon">📞</span>
                    <span class="s-text">Comment contacter l'ISI ?</span>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages" style="display:none;"></div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-content">
                <div class="message-avatar" style="background:#19c37d; color:white;">🤖</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="questionInput" 
                    placeholder="Poser une question"
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" id="sendButton" onclick="askQuestion()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ÉTAT =====
        let isProcessing = false;
        let messageCount = 0;

        // ===== DOM REFS =====
        const chatMessages = document.getElementById('chatMessages');
        const centerContent = document.getElementById('centerContent');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        // ===== SIDEBAR TOGGLE =====
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        overlay.addEventListener('click', toggleSidebar);

        // ===== AUTO-RESIZE =====
        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // ===== KEYBOARD =====
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        }

        // ===== SUGGESTION CLICK =====
        function askSuggestion(text) {
            questionInput.value = text;
            askQuestion();
        }

        // ===== ENVOYER =====
        async function askQuestion() {
            const question = questionInput.value.trim();
            if (!question || isProcessing) return;

            // Cacher les suggestions
            centerContent.style.display = 'none';
            chatMessages.style.display = 'block';

            isProcessing = true;
            sendButton.disabled = true;
            questionInput.disabled = true;

            addMessage(question, 'user');
            questionInput.value = '';
            questionInput.style.height = 'auto';

            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, top_k: 3 })
                });

                const data = await response.json();
                typingIndicator.classList.remove('active');

                if (response.ok) {
                    let botMessage = data.answer.replace(/\n/g, '<br>');
                    
                    if (data.sources && data.sources.length > 0) {
                        let sourcesHtml = '<div class="sources">';
                        sourcesHtml += '<details>';
                        sourcesHtml += '<summary>📚 Sources utilisées</summary>';
                        data.sources.forEach((source, index) => {
                            sourcesHtml += `<div class="source-item">
                                <strong>Source ${index + 1}</strong> (pertinence: ${(1 - source.distance).toFixed(2)}%)<br>
                                ${source.content.replace(/\n/g, ' ')}
                            </div>`;
                        });
                        sourcesHtml += '</details>';
                        sourcesHtml += '</div>';
                        botMessage += sourcesHtml;
                    }
                    
                    addMessage(botMessage, 'bot');
                } else {
                    addMessage(`❌ **Erreur :** ${data.detail || 'Une erreur est survenue'}`, 'bot');
                }
            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage(`❌ **Erreur de connexion :** ${error.message}`, 'bot');
            } finally {
                isProcessing = false;
                sendButton.disabled = false;
                questionInput.disabled = false;
                questionInput.focus();
            }
        }

        // ===== AJOUTER UN MESSAGE =====
        function addMessage(content, type) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type}`;
            
            const avatar = type === 'user' ? '👤' : '🤖';
            const avatarClass = type === 'user' ? 'background:#10a37f;' : 'background:#19c37d;';
            
            wrapper.innerHTML = `
                <div class="message-content">
                    <div class="message-avatar" style="${avatarClass} color:white;">${avatar}</div>
                    <div class="message-text">${content}</div>
                </div>
            `;
            
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ===== RÉINITIALISER =====
        function resetChat() {
            chatMessages.innerHTML = '';
            chatMessages.style.display = 'none';
            centerContent.style.display = 'flex';
            questionInput.value = '';
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        // ===== FOCUS =====
        document.addEventListener('DOMContentLoaded', () => {
            questionInput.focus();
        });

        // ===== FERMER SIDEBAR SUR MOBILE =====
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !e.target.closest('.menu-toggle')) {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                }
            }
        });

        console.log('ISI Assistant prêt !');
    </script>
</body>
</html>
