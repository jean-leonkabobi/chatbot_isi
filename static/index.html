<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Chatbot ISI</title>
    <style>
        /* Styles intégrés */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
            height: 90vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4a00e0 0%, #8e2de2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #4a00e0;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.bot .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }

        .message.bot .sources details {
            cursor: pointer;
        }

        .message.bot .sources summary {
            font-weight: 600;
            color: #4a00e0;
        }

        .message.bot .sources .source-item {
            margin: 5px 0;
            padding: 5px 10px;
            background: #f1f3f5;
            border-radius: 4px;
            font-size: 11px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-container input:focus {
            border-color: #4a00e0;
        }

        .chat-input-container button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #4a00e0 0%, #8e2de2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .chat-input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 0, 224, 0.3);
        }

        .chat-input-container button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            max-width: 60px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4a00e0;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #fcc;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                width: 100%;
            }
            
            .chat-input-container button {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- En-tête -->
        <div class="chat-header">
            <h1>🤖 Chatbot ISI</h1>
            <p>Posez vos questions sur l'Institut Supérieur d'Informatique</p>
        </div>

        <!-- Zone des messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                Bonjour ! Je suis l'assistant virtuel de l'ISI. <br>
                Posez-moi une question sur l'institut, ses formations, ses campus, ou tout autre sujet.
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Zone de saisie -->
        <div class="chat-input-container">
            <input type="text" id="questionInput" placeholder="Écrivez votre question..." />
            <button id="sendButton" onclick="askQuestion()">Envoyer</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        // Appuyer sur Entrée pour envoyer
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                askQuestion();
            }
        });

        async function askQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            // Ajouter le message de l'utilisateur
            addMessage(question, 'user');
            questionInput.value = '';
            sendButton.disabled = true;
            
            // Afficher l'indicateur de saisie
            typingIndicator.classList.add('active');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        top_k: 3
                    })
                });

                const data = await response.json();

                // Cacher l'indicateur de saisie
                typingIndicator.classList.remove('active');

                if (response.ok) {
                    // Afficher la réponse du bot
                    let botMessage = data.answer;
                    
                    // Ajouter les sources si disponibles
                    if (data.sources && data.sources.length > 0) {
                        botMessage += '<div class="sources">';
                        botMessage += '<details>';
                        botMessage += '<summary>📚 Sources utilisées</summary>';
                        data.sources.forEach((source, index) => {
                            botMessage += `<div class="source-item">
                                <strong>Source ${index + 1}</strong> (distance: ${source.distance.toFixed(4)})<br>
                                ${source.content}
                            </div>`;
                        });
                        botMessage += '</details>';
                        botMessage += '</div>';
                    }
                    
                    addMessage(botMessage, 'bot');
                } else {
                    // Gérer l'erreur
                    addMessage(`❌ Erreur : ${data.detail || 'Une erreur est survenue'}`, 'bot');
                }
            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage(`❌ Erreur de connexion : ${error.message}`, 'bot');
            } finally {
                sendButton.disabled = false;
                questionInput.focus();
            }
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = content;
            chatMessages.appendChild(messageDiv);
            // Scroll vers le bas
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
